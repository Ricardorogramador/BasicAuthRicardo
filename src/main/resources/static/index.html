<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasicAuth Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      padding: 1rem;
    }

    .container {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: #e2e8f0;
    }

    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .tab-btn.active {
      background: #0f3460;
      color: #e2e8f0;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
    }

    input::placeholder {
      color: #475569;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .alert {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.18);
      border: 1px solid rgba(16, 185, 129, 0.45);
      color: #6ee7b7;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.18);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fca5a5;
    }

    .token-display {
      margin-top: 1rem;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 0.75rem;
      color: #7dd3fc;
      word-break: break-all;
      display: none;
    }

    .token-display.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔐 BasicAuth</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="user@example.com" required>
    </div>
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" id="loginBtn">Sign In</button>
    <div id="loginAlert" class="alert"></div>
    <div id="loginToken" class="token-display"></div>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="registerName">Full Name</label>
      <input type="text" id="registerName" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label for="registerEmail">Email</label>
      <input type="email" id="registerEmail" placeholder="user@example.com" required>
    </div>
    <div class="form-group">
      <label for="registerPassword">Password (min 7 chars)</label>
      <input type="password" id="registerPassword" placeholder="••••••••" minlength="7" required>
    </div>
    <button type="submit" id="registerBtn">Create Account</button>
    <div id="registerAlert" class="alert"></div>
    <div id="registerToken" class="token-display"></div>
  </form>
</div>

<script>
  const API_BASE = 'http://localhost:8080/api/auth';

  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabs = document.querySelectorAll('.tab-btn');

    if (tab === 'login') {
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
      tabs[0].classList.add('active');
      tabs[1].classList.remove('active');
    } else {
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      tabs[0].classList.remove('active');
      tabs[1].classList.add('active');
    }
    clearAlerts();
  }

  function clearAlerts() {
    ['loginAlert', 'registerAlert'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('show', 'success', 'error');
      el.textContent = '';
    });
    ['loginToken', 'registerToken'].forEach(id => {
      document.getElementById(id).classList.remove('show');
    });
  }

  function showAlert(elementId, message, type) {
    const el = document.getElementById(elementId);
    el.textContent = message;
    el.className = `alert show ${type}`;
  }

  function showToken(elementId, token) {
    const el = document.getElementById(elementId);
    el.textContent = `Token: ${token}`;
    el.classList.add('show');
  }

  async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    clearAlerts();

    try {
      const response = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showAlert('loginAlert', '✅ Login successful!', 'success');
        if (data.token) {
          localStorage.setItem('authToken', data.token);
          showToken('loginToken', data.token);
        }
        document.getElementById('loginForm').reset();
      } else {
        const errorMsg = data.message || data.error || 'Login failed';
        showAlert('loginAlert', `❌ ${errorMsg}`, 'error');
      }
    } catch (error) {
      showAlert('loginAlert', `❌ Connection error: ${error.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(event) {
    event.preventDefault();
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const btn = document.getElementById('registerBtn');

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    clearAlerts();

    try {
      const response = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        credentials: 'include',
        body: JSON.stringify({ name, email, password })
      });

      const data = await response.json();

      if (response.ok) {
        showAlert('registerAlert', '✅ Account created! You can now login.', 'success');
        if (data.token) {
          localStorage.setItem('authToken', data.token);
          showToken('registerToken', data.token);
        }
        document.getElementById('registerForm').reset();
      } else {
        const errorMsg = data.message || data.error || 'Registration failed';
        showAlert('registerAlert', `❌ ${errorMsg}`, 'error');
      }
    } catch (error) {
      showAlert('registerAlert', `❌ Connection error: ${error.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
